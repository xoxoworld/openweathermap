<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>기상청 단기예보 조회</title>
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --sky: #0ea5e9;
        --sky-dark: #0284c7;
        --sky-light: #e0f2fe;
        --navy: #0f172a;
        --slate: #334155;
        --muted: #64748b;
        --border: #e2e8f0;
        --bg: #f8fafc;
        --white: #ffffff;
        --warm: #f97316;
        --cool: #3b82f6;
        --green: #10b981;
        --radius: 12px;
        --shadow: 0 4px 20px rgba(14, 165, 233, 0.12);
        --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.07);
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      body {
        font-family: "Noto Sans KR", sans-serif;
        background: var(--bg);
        color: var(--navy);
        min-height: 100vh;
      }
      .app-header {
        background: linear-gradient(135deg, #0369a1 0%, #0ea5e9 50%, #38bdf8 100%);
        padding: 2rem 0 3.5rem;
        position: relative;
        overflow: hidden;
      }
      .app-header::before {
        content: "";
        position: absolute;
        inset: 0;
        background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
      }
      .app-header h1 {
        color: white;
        font-size: 1.9rem;
        font-weight: 700;
        letter-spacing: -0.5px;
        margin: 0;
        text-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
      }
      .app-header p {
        color: rgba(255, 255, 255, 0.85);
        margin: 0.4rem 0 0;
        font-size: 0.92rem;
        font-weight: 300;
      }
      .header-icon {
        font-size: 2.8rem;
        margin-bottom: 0.5rem;
        display: block;
        filter: drop-shadow(0 2px 6px rgba(0, 0, 0, 0.2));
      }

      .search-card {
        background: var(--white);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        padding: 1.8rem;
        margin-top: -2rem;
        position: relative;
        z-index: 10;
      }

      .form-label {
        font-size: 0.8rem;
        font-weight: 500;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-bottom: 0.4rem;
      }
      .form-control,
      .form-select {
        border: 1.5px solid var(--border);
        border-radius: 8px;
        font-size: 0.9rem;
        padding: 0.55rem 0.85rem;
        color: var(--navy);
        background-color: var(--white);
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
        font-family: "Noto Sans KR", sans-serif;
      }
      .form-control:focus,
      .form-select:focus {
        border-color: var(--sky);
        box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.15);
        outline: none;
      }
      .btn-search {
        background: linear-gradient(135deg, var(--sky-dark), var(--sky));
        color: white;
        border: none;
        border-radius: 8px;
        padding: 0.6rem 1.8rem;
        font-size: 0.9rem;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s;
        font-family: "Noto Sans KR", sans-serif;
        white-space: nowrap;
      }
      .btn-search:hover {
        transform: translateY(-1px);
        box-shadow: 0 4px 14px rgba(14, 165, 233, 0.4);
      }
      .btn-search:active {
        transform: translateY(0);
      }
      .btn-search:disabled {
        opacity: 0.65;
        transform: none;
        cursor: not-allowed;
      }

      /* Result section */
      .result-section {
        margin-top: 1.5rem;
      }
      .result-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 1rem;
      }
      .result-title {
        font-size: 0.85rem;
        font-weight: 600;
        color: var(--slate);
        display: flex;
        align-items: center;
        gap: 0.4rem;
      }
      .result-badge {
        background: var(--sky-light);
        color: var(--sky-dark);
        border-radius: 20px;
        font-size: 0.75rem;
        padding: 0.2rem 0.7rem;
        font-weight: 600;
      }

      /* Table */
      .table-wrap {
        background: var(--white);
        border-radius: var(--radius);
        box-shadow: var(--shadow-sm);
        overflow: hidden;
      }
      .forecast-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.875rem;
      }
      .forecast-table thead tr {
        background: var(--navy);
        color: white;
      }
      .forecast-table thead th {
        padding: 0.9rem 1.1rem;
        font-weight: 500;
        font-size: 0.8rem;
        letter-spacing: 0.04em;
        text-align: center;
        white-space: nowrap;
      }
      .forecast-table thead th:first-child {
        text-align: left;
      }
      .forecast-table tbody tr {
        border-bottom: 1px solid var(--border);
        transition: background 0.15s;
      }
      .forecast-table tbody tr:last-child {
        border-bottom: none;
      }
      .forecast-table tbody tr:hover {
        background: #f0f9ff;
      }
      .forecast-table tbody td {
        padding: 0.85rem 1.1rem;
        text-align: center;
        color: var(--slate);
        vertical-align: middle;
      }
      .forecast-table tbody td:first-child {
        text-align: left;
      }

      .time-cell {
        font-family: "JetBrains Mono", monospace;
        font-weight: 600;
        color: var(--navy);
        font-size: 0.9rem;
      }
      .date-sub {
        font-size: 0.72rem;
        color: var(--muted);
        font-family: "Noto Sans KR", sans-serif;
        font-weight: 400;
        display: block;
        margin-top: 1px;
      }

      .temp-badge {
        display: inline-flex;
        align-items: center;
        gap: 3px;
        padding: 0.28rem 0.7rem;
        border-radius: 20px;
        font-family: "JetBrains Mono", monospace;
        font-weight: 600;
        font-size: 0.88rem;
      }
      .temp-hot {
        background: #fff1eb;
        color: #c2410c;
      }
      .temp-warm {
        background: #fff7ed;
        color: #ea580c;
      }
      .temp-mild {
        background: #fefce8;
        color: #a16207;
      }
      .temp-cool {
        background: #eff6ff;
        color: #1d4ed8;
      }
      .temp-cold {
        background: #f0f9ff;
        color: #0369a1;
      }
      .temp-freeze {
        background: #e0f2fe;
        color: #075985;
      }

      .humid-bar-wrap {
        display: flex;
        align-items: center;
        gap: 8px;
        justify-content: center;
      }
      .humid-bar {
        width: 60px;
        height: 6px;
        background: var(--border);
        border-radius: 3px;
        overflow: hidden;
      }
      .humid-fill {
        height: 100%;
        border-radius: 3px;
        background: linear-gradient(90deg, var(--sky), #06b6d4);
        transition: width 0.4s ease;
      }
      .humid-val {
        font-family: "JetBrains Mono", monospace;
        font-size: 0.82rem;
        color: var(--slate);
        min-width: 34px;
        text-align: right;
      }

      .sky-chip {
        display: inline-block;
        padding: 0.2rem 0.6rem;
        border-radius: 20px;
        font-size: 0.78rem;
        font-weight: 500;
      }
      .sky-1 {
        background: #fef9c3;
        color: #854d0e;
      }
      .sky-3 {
        background: #f1f5f9;
        color: #475569;
      }
      .sky-4 {
        background: #e2e8f0;
        color: #334155;
      }

      .rain-chip {
        display: inline-block;
        padding: 0.2rem 0.6rem;
        border-radius: 20px;
        font-size: 0.78rem;
        font-weight: 500;
      }
      .rain-0 {
        background: #f0fdf4;
        color: #166534;
      }
      .rain-1 {
        background: #e0f2fe;
        color: #075985;
      }
      .rain-2 {
        background: #f0f9ff;
        color: #0c4a6e;
      }
      .rain-3 {
        background: #fef3c7;
        color: #92400e;
      }
      .rain-4 {
        background: #eff6ff;
        color: #1e40af;
      }
      .rain-5 {
        background: #f0fdf4;
        color: #065f46;
      }
      .rain-6 {
        background: #f8fafc;
        color: #475569;
      }
      .rain-7 {
        background: #fdf4ff;
        color: #7e22ce;
      }

      /* Pagination */
      .pagination-wrap {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 0.3rem;
        padding: 1.2rem 0 0.5rem;
      }
      .page-btn {
        width: 34px;
        height: 34px;
        border: 1.5px solid var(--border);
        background: var(--white);
        border-radius: 8px;
        font-size: 0.82rem;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--slate);
        transition: all 0.15s;
        font-family: "Noto Sans KR", sans-serif;
      }
      .page-btn:hover:not(:disabled) {
        border-color: var(--sky);
        color: var(--sky);
        background: var(--sky-light);
      }
      .page-btn.active {
        background: var(--sky);
        border-color: var(--sky);
        color: white;
        font-weight: 600;
      }
      .page-btn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }

      /* Loading / empty */
      .state-box {
        background: var(--white);
        border-radius: var(--radius);
        box-shadow: var(--shadow-sm);
        padding: 3rem 1.5rem;
        text-align: center;
      }
      .state-icon {
        font-size: 3rem;
        margin-bottom: 0.8rem;
      }
      .state-title {
        font-size: 1rem;
        font-weight: 600;
        color: var(--slate);
        margin-bottom: 0.3rem;
      }
      .state-sub {
        font-size: 0.85rem;
        color: var(--muted);
      }

      .spinner-ring {
        width: 42px;
        height: 42px;
        border: 3.5px solid var(--sky-light);
        border-top-color: var(--sky);
        border-radius: 50%;
        animation: spin 0.75s linear infinite;
        margin: 0 auto 1rem;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .info-row {
        background: var(--sky-light);
        border-left: 3px solid var(--sky);
        border-radius: 0 8px 8px 0;
        padding: 0.7rem 1rem;
        font-size: 0.82rem;
        color: var(--sky-dark);
        margin-bottom: 1rem;
      }

      @media (max-width: 576px) {
        .app-header {
          padding: 1.5rem 0 3rem;
        }
        .app-header h1 {
          font-size: 1.4rem;
        }
        .search-card {
          padding: 1.2rem;
        }
        .forecast-table thead th,
        .forecast-table tbody td {
          padding: 0.65rem 0.6rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="app-header">
      <div class="container">
        <span class="header-icon">⛅</span>
        <h1>기상청 단기예보 조회</h1>
        <p>지역과 날짜를 선택하여 시간별 날씨 정보를 확인하세요</p>
      </div>
    </div>

    <div class="container pb-5">
      <!-- Search Card -->
      <div class="search-card">
        <div class="row g-3 align-items-end">
          <!-- 날짜 -->
          <div class="col-12 col-sm-6 col-md-3">
            <label class="form-label">📅 날짜</label>
            <input type="date" id="inputDate" class="form-control" />
          </div>
          <!-- 시/도 -->
          <div class="col-12 col-sm-6 col-md-3">
            <label class="form-label">📍 시/도</label>
            <select id="selectSido" class="form-select">
              <option value="">-- 선택 --</option>
            </select>
          </div>
          <!-- 시/군/구 -->
          <div class="col-12 col-sm-6 col-md-3">
            <label class="form-label">🏙️ 시/군/구</label>
            <select id="selectSigungu" class="form-select" disabled>
              <option value="">-- 선택 --</option>
            </select>
          </div>
          <!-- 읍/면/동 -->
          <div class="col-12 col-sm-6 col-md-2">
            <label class="form-label">🏘️ 읍/면/동</label>
            <select id="selectDong" class="form-select" disabled>
              <option value="">-- 선택 --</option>
            </select>
          </div>
          <!-- 조회 버튼 -->
          <div class="col-12 col-md-1">
            <button id="btnSearch" class="btn-search w-100" onclick="searchForecast()">조회</button>
          </div>
        </div>
        <div id="coordInfo" class="mt-3 d-none">
          <div class="info-row">
            <strong>📌 격자좌표:</strong> &nbsp;
            <span id="coordText"></span>
          </div>
        </div>
      </div>

      <!-- Result Section -->
      <div id="resultSection" class="result-section d-none">
        <div class="result-header">
          <div class="result-title">
            <span>🌡️</span> 시간별 예보 데이터
            <span class="result-badge" id="totalBadge"></span>
          </div>
          <div style="font-size: 0.78rem; color: var(--muted)" id="baseInfo"></div>
        </div>
        <div class="table-wrap">
          <table class="forecast-table">
            <thead>
              <tr>
                <th>🕐 시각</th>
                <th>🌡️ 기온 (°C)</th>
                <th>💧 습도 (%)</th>
                <th>☁️ 하늘상태</th>
                <th>🌧️ 강수형태</th>
                <th>💦 강수확률 (%)</th>
                <th>🌬️ 풍속 (m/s)</th>
              </tr>
            </thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
        <div class="pagination-wrap" id="pagination"></div>
      </div>

      <!-- State boxes -->
      <div id="stateLoading" class="result-section d-none">
        <div class="state-box">
          <div class="spinner-ring"></div>
          <div class="state-title">예보 데이터를 불러오는 중...</div>
          <div class="state-sub">기상청 API에 요청 중입니다</div>
        </div>
      </div>
      <div id="stateEmpty" class="result-section d-none">
        <div class="state-box">
          <div class="state-icon">🔍</div>
          <div class="state-title">지역과 날짜를 선택한 후 조회하세요</div>
          <div class="state-sub">
            시/도 → 시/군/구 순서로 선택하면 자동으로 격자 좌표가 설정됩니다
          </div>
        </div>
      </div>
      <div id="stateError" class="result-section d-none">
        <div class="state-box">
          <div class="state-icon">⚠️</div>
          <div class="state-title" id="errorTitle">데이터를 불러올 수 없습니다</div>
          <div class="state-sub" id="errorSub"></div>
        </div>
      </div>
    </div>

    <script>
      // ─── Constants ────────────────────────────────────────────────
      const SERVICE_KEY =

      const BASE_TIMES = ["0200", "0500", "0800", "1100", "1400", "1700", "2000", "2300"];
      const ITEMS_PER_PAGE = 10;

      // ─── State ────────────────────────────────────────────────────
      let allRows = [];
      let currentPage = 1;
      let currentNx = 55,
        currentNy = 127;

      // ─── Init ─────────────────────────────────────────────────────
      document.addEventListener("DOMContentLoaded", () => {
        // Set today's date
        const today = new Date();
        const yyyy = today.getFullYear();
        const mm = String(today.getMonth() + 1).padStart(2, "0");
        const dd = String(today.getDate()).padStart(2, "0");
        document.getElementById("inputDate").value = `${yyyy}-${mm}-${dd}`;

        // Populate sido
        const sido = document.getElementById("selectSido");
        Object.keys(REGIONS)
          .sort()
          .forEach(s1 => {
            const opt = document.createElement("option");
            opt.value = s1;
            opt.textContent = s1;
            sido.appendChild(opt);
          });

        showState("empty");
      });

      // ─── Cascading selects ────────────────────────────────────────
      document.getElementById("selectSido").addEventListener("change", function () {
        const s1 = this.value;
        const sigungu = document.getElementById("selectSigungu");
        const dong = document.getElementById("selectDong");
        sigungu.innerHTML = '<option value="">-- 선택 --</option>';
        dong.innerHTML = '<option value="">-- 선택 --</option>';
        sigungu.disabled = true;
        dong.disabled = true;
        hideCoord();

        if (!s1) return;
        const data = REGIONS[s1];
        currentNx = data.nx;
        currentNy = data.ny;
        showCoord(s1, "", "");

        const children = data.children;
        if (Object.keys(children).length > 0) {
          Object.keys(children)
            .sort()
            .forEach(s2 => {
              const opt = document.createElement("option");
              opt.value = s2;
              opt.textContent = s2;
              sigungu.appendChild(opt);
            });
          sigungu.disabled = false;
        }
      });

      document.getElementById("selectSigungu").addEventListener("change", function () {
        const s1 = document.getElementById("selectSido").value;
        const s2 = this.value;
        const dong = document.getElementById("selectDong");
        dong.innerHTML = '<option value="">-- 선택 --</option>';
        dong.disabled = true;

        if (!s2) {
          const data = REGIONS[s1];
          currentNx = data.nx;
          currentNy = data.ny;
          showCoord(s1, "", "");
          return;
        }
        const data = REGIONS[s1].children[s2];
        currentNx = data.nx;
        currentNy = data.ny;
        showCoord(s1, s2, "");

        const children = data.children;
        if (children && Object.keys(children).length > 0) {
          Object.keys(children)
            .sort()
            .forEach(s3 => {
              const opt = document.createElement("option");
              opt.value = s3;
              opt.textContent = s3;
              dong.appendChild(opt);
            });
          dong.disabled = false;
        }
      });

      document.getElementById("selectDong").addEventListener("change", function () {
        const s1 = document.getElementById("selectSido").value;
        const s2 = document.getElementById("selectSigungu").value;
        const s3 = this.value;
        if (!s3) return;
        const data = REGIONS[s1].children[s2].children[s3];
        currentNx = data.nx;
        currentNy = data.ny;
        showCoord(s1, s2, s3);
      });

      function showCoord(s1, s2, s3) {
        const label = [s1, s2, s3].filter(Boolean).join(" > ");
        document.getElementById("coordText").innerHTML =
          `<strong>${label}</strong> &nbsp;|&nbsp; nx = <code>${currentNx}</code>, ny = <code>${currentNy}</code>`;
        document.getElementById("coordInfo").classList.remove("d-none");
      }
      function hideCoord() {
        document.getElementById("coordInfo").classList.add("d-none");
      }

      // ─── Forecast search ──────────────────────────────────────────
      async function searchForecast() {
        const dateVal = document.getElementById("inputDate").value;
        if (!dateVal) {
          alert("날짜를 선택해주세요.");
          return;
        }
        if (!document.getElementById("selectSido").value) {
          alert("지역을 선택해주세요.");
          return;
        }

        const baseDate = dateVal.replace(/-/g, "");

        showState("loading");
        document.getElementById("btnSearch").disabled = true;

        // Try each base_time from latest to earliest
        const sortedTimes = [...BASE_TIMES].reverse();
        let data = null;
        let usedTime = null;

        for (const bt of sortedTimes) {
          try {
            const url =
              `https://apis.data.go.kr/1360000/VilageFcstInfoService_2.0/getVilageFcst` +
              `?serviceKey=${SERVICE_KEY}` +
              `&pageNo=1&numOfRows=1000&dataType=JSON` +
              `&base_date=${baseDate}&base_time=${bt}` +
              `&nx=${currentNx}&ny=${currentNy}`;
            const res = await fetch(url);
            const json = await res.json();
            const resultCode = json?.response?.header?.resultCode;
            if (resultCode === "00" || resultCode === "0000") {
              const items = json?.response?.body?.items?.item;
              if (items && items.length > 0) {
                data = items;
                usedTime = bt;
                break;
              }
            }
          } catch (e) {
            /* try next */
          }
        }

        document.getElementById("btnSearch").disabled = false;

        if (!data) {
          showState("error");
          document.getElementById("errorTitle").textContent = "예보 데이터를 불러오지 못했습니다";
          document.getElementById("errorSub").textContent =
            "선택한 날짜/지역의 예보 데이터가 없거나 API 오류가 발생했습니다. 날짜를 변경하거나 잠시 후 다시 시도해주세요.";
          return;
        }

        // Process data: group by fcstDate + fcstTime
        const grouped = {};
        data.forEach(item => {
          const key = `${item.fcstDate}_${item.fcstTime}`;
          if (!grouped[key]) grouped[key] = { date: item.fcstDate, time: item.fcstTime };
          grouped[key][item.category] = item.fcstValue;
        });

        // Filter to selected date only
        const rows = Object.values(grouped)
          .filter(r => r.date === baseDate)
          .sort((a, b) => a.time.localeCompare(b.time));

        if (rows.length === 0) {
          showState("error");
          document.getElementById("errorTitle").textContent = "선택한 날짜의 예보가 없습니다";
          document.getElementById("errorSub").textContent = "다른 날짜를 선택해 주세요.";
          return;
        }

        allRows = rows;
        currentPage = 1;
        document.getElementById("totalBadge").textContent = `총 ${rows.length}건`;
        document.getElementById("baseInfo").textContent =
          `발표 기준시각: ${baseDate.slice(0, 4)}-${baseDate.slice(4, 6)}-${baseDate.slice(6)} ${usedTime.slice(0, 2)}:${usedTime.slice(2)}`;
        renderTable();
        showState("result");
      }

      // ─── Render ───────────────────────────────────────────────────
      function renderTable() {
        const start = (currentPage - 1) * ITEMS_PER_PAGE;
        const pageRows = allRows.slice(start, start + ITEMS_PER_PAGE);

        const tbody = document.getElementById("tableBody");
        tbody.innerHTML = "";

        pageRows.forEach(row => {
          const tr = document.createElement("tr");
          tr.innerHTML = `
      <td>
        <span class="time-cell">${formatTime(row.time)}</span>
        <span class="date-sub">${formatDate(row.date)}</span>
      </td>
      <td>${tempBadge(row.TMP)}</td>
      <td>${humidCell(row.REH)}</td>
      <td>${skyChip(row.SKY)}</td>
      <td>${rainChip(row.PTY)}</td>
      <td>${row.POP !== undefined ? row.POP + "%" : "-"}</td>
      <td>${row.WSD !== undefined ? row.WSD + " m/s" : "-"}</td>
    `;
          tbody.appendChild(tr);
        });

        renderPagination();
      }

      function renderPagination() {
        const total = allRows.length;
        const totalPages = Math.ceil(total / ITEMS_PER_PAGE);
        const pg = document.getElementById("pagination");
        pg.innerHTML = "";
        if (totalPages <= 1) return;

        const prev = makePageBtn("‹", currentPage > 1, () => {
          currentPage--;
          renderTable();
        });
        pg.appendChild(prev);

        const range = pageRange(currentPage, totalPages);
        range.forEach(p => {
          if (p === "...") {
            const span = document.createElement("span");
            span.style.cssText = "color:var(--muted);font-size:.8rem;padding:0 4px;";
            span.textContent = "···";
            pg.appendChild(span);
          } else {
            const btn = makePageBtn(p, true, () => {
              currentPage = p;
              renderTable();
            });
            if (p === currentPage) btn.classList.add("active");
            pg.appendChild(btn);
          }
        });

        const next = makePageBtn("›", currentPage < totalPages, () => {
          currentPage++;
          renderTable();
        });
        pg.appendChild(next);
      }

      function makePageBtn(label, enabled, onClick) {
        const btn = document.createElement("button");
        btn.className = "page-btn";
        btn.textContent = label;
        if (!enabled) btn.disabled = true;
        else btn.addEventListener("click", onClick);
        return btn;
      }

      function pageRange(cur, total) {
        if (total <= 7) return Array.from({ length: total }, (_, i) => i + 1);
        const pages = [];
        if (cur <= 4) {
          for (let i = 1; i <= 5; i++) pages.push(i);
          pages.push("...");
          pages.push(total);
        } else if (cur >= total - 3) {
          pages.push(1);
          pages.push("...");
          for (let i = total - 4; i <= total; i++) pages.push(i);
        } else {
          pages.push(1);
          pages.push("...");
          for (let i = cur - 1; i <= cur + 1; i++) pages.push(i);
          pages.push("...");
          pages.push(total);
        }
        return pages;
      }

      // ─── Formatters ───────────────────────────────────────────────
      function formatTime(t) {
        return `${t.slice(0, 2)}:${t.slice(2)}`;
      }
      function formatDate(d) {
        return `${d.slice(0, 4)}.${d.slice(4, 6)}.${d.slice(6)}`;
      }

      function tempBadge(val) {
        if (val === undefined || val === null) return "-";
        const v = parseFloat(val);
        let cls = "temp-mild";
        if (v >= 33) cls = "temp-hot";
        else if (v >= 26) cls = "temp-warm";
        else if (v >= 18) cls = "temp-mild";
        else if (v >= 8) cls = "temp-cool";
        else if (v >= 0) cls = "temp-cold";
        else cls = "temp-freeze";
        const icon = v >= 30 ? "🔥" : v >= 20 ? "🌤️" : v >= 10 ? "🌬️" : "❄️";
        return `<span class="temp-badge ${cls}">${icon} ${v}°C</span>`;
      }

      function humidCell(val) {
        if (val === undefined) return "-";
        const v = parseInt(val);
        return `<div class="humid-bar-wrap">
    <div class="humid-bar"><div class="humid-fill" style="width:${v}%"></div></div>
    <span class="humid-val">${v}%</span>
  </div>`;
      }

      const SKY_MAP = { 1: "☀️ 맑음", 3: "⛅ 구름많음", 4: "☁️ 흐림" };
      const SKY_CLS = { 1: "sky-1", 3: "sky-3", 4: "sky-4" };
      function skyChip(val) {
        if (!val) return "-";
        return `<span class="sky-chip ${SKY_CLS[val] || "sky-4"}">${SKY_MAP[val] || val}</span>`;
      }

      const RAIN_MAP = {
        0: "없음",
        1: "🌧️ 비",
        2: "🌨️ 비/눈",
        3: "❄️ 눈",
        4: "🌩️ 소나기",
        5: "🌧️ 빗방울",
        6: "🌨️ 빗방울/눈날림",
        7: "❄️ 눈날림",
      };
      function rainChip(val) {
        if (val === undefined) return "-";
        const v = String(val);
        return `<span class="rain-chip rain-${v}">${RAIN_MAP[v] || v}</span>`;
      }

      // ─── UI state manager ─────────────────────────────────────────
      function showState(state) {
        document.getElementById("resultSection").classList.add("d-none");
        document.getElementById("stateLoading").classList.add("d-none");
        document.getElementById("stateEmpty").classList.add("d-none");
        document.getElementById("stateError").classList.add("d-none");
        if (state === "result") document.getElementById("resultSection").classList.remove("d-none");
        else if (state === "loading")
          document.getElementById("stateLoading").classList.remove("d-none");
        else if (state === "empty")
          document.getElementById("stateEmpty").classList.remove("d-none");
        else if (state === "error")
          document.getElementById("stateError").classList.remove("d-none");
      }
    </script>
  </body>
</html>
